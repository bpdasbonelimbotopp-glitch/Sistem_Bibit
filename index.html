<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Sistem Bibit BPDAS</title>

<script src="https://cdn.tailwindcss.com"></script>

<link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">

<style>
body{
    background: linear-gradient(to bottom,#86d086,#249458);
    min-height:100vh;
}
</style>

</head>
<body class="font-sans">

<!-- LOGIN -->
<div id="loginPage" class="flex items-center justify-center min-h-screen p-4">

<div class="bg-white p-8 rounded-xl shadow-xl w-full max-w-md">

<div class="text-center mb-6">

<img
src="https://upload.wikimedia.org/wikipedia/commons/thumb/7/7b/Logo_Kementerian_Kehutanan_Republik_Indonesia.svg/1200px-Logo_Kementerian_Kehutanan_Republik_Indonesia.svg.png"
class="h-20 mx-auto mb-3">

<h1 class="font-bold text-2xl text-green-800">
BPDAS BONE LIMBOTO
</h1>

<p class="text-gray-600">
Sistem Produksi & Distribusi Bibit
</p>

</div>

<div class="space-y-4">

<input
type="text"
id="username"
placeholder="Username"
class="w-full border p-3 rounded-lg">

<input
type="password"
id="password"
placeholder="Password"
class="w-full border p-3 rounded-lg">

<button
onclick="login()"
class="w-full bg-green-700 hover:bg-green-800 text-white py-3 rounded-lg">
Masuk
</button>

</div>

<div class="mt-4 text-sm text-gray-500 text-center">
Admin : admin / admin123
<br>
Warga : warga / warga123
</div>

</div>

</div>



<!-- DASHBOARD -->
<div id="dashboard" class="hidden p-4">

<div class="max-w-7xl mx-auto">

<div class="bg-white rounded-xl p-5 shadow-lg mb-5">

<div class="flex justify-between items-center">

<div>

<h1 class="text-2xl font-bold text-green-800">
BPDAS BONE LIMBOTO
</h1>

<p class="text-gray-600">
Sistem Produksi & Distribusi Bibit
</p>

</div>

<button
onclick="logout()"
class="bg-red-600 text-white px-4 py-2 rounded-lg">
Logout
</button>

</div>

</div>



<!-- FORM -->
<div class="bg-white rounded-xl shadow-lg p-5 mb-5">

<div class="grid md:grid-cols-4 gap-3">

<input
type="text"
id="namaBibit"
placeholder="Nama Bibit"
class="border p-3 rounded-lg">

<input
type="number"
id="jumlah"
placeholder="Jumlah"
class="border p-3 rounded-lg">

<select
id="jenis"
class="border p-3 rounded-lg">

<option value="produksi">Produksi</option>
<option value="distribusi">Distribusi</option>

</select>

<button
onclick="simpanData()"
class="bg-green-700 hover:bg-green-800 text-white rounded-lg">
Simpan Data
</button>

</div>

</div>



<!-- CARD -->
<div class="grid md:grid-cols-3 gap-4 mb-5">

<div class="bg-white p-5 rounded-xl shadow-lg text-center">
<p class="text-gray-500">Total Produksi</p>
<h1 id="totalProduksi" class="text-3xl font-bold text-green-700">0</h1>
</div>

<div class="bg-white p-5 rounded-xl shadow-lg text-center">
<p class="text-gray-500">Total Distribusi</p>
<h1 id="totalDistribusi" class="text-3xl font-bold text-yellow-700">0</h1>
</div>

<div class="bg-white p-5 rounded-xl shadow-lg text-center">
<p class="text-gray-500">Sisa Stok</p>
<h1 id="sisaStok" class="text-3xl font-bold text-blue-700">0</h1>
</div>

</div>



<!-- TABLE -->
<div class="grid lg:grid-cols-2 gap-5">

<!-- PRODUKSI -->
<div class="bg-white rounded-xl shadow-lg p-5">

<h2 class="font-bold text-lg mb-4 text-green-700">
Data Produksi
</h2>

<div class="overflow-auto">

<table class="w-full text-sm">

<thead>

<tr class="bg-gray-100">

<th class="border p-2">Tanggal</th>
<th class="border p-2">Bibit</th>
<th class="border p-2">Jumlah</th>

</tr>

</thead>

<tbody id="produksiBody"></tbody>

</table>

</div>

</div>



<!-- DISTRIBUSI -->
<div class="bg-white rounded-xl shadow-lg p-5">

<h2 class="font-bold text-lg mb-4 text-yellow-700">
Data Distribusi
</h2>

<div class="overflow-auto">

<table class="w-full text-sm">

<thead>

<tr class="bg-gray-100">

<th class="border p-2">Tanggal</th>
<th class="border p-2">Bibit</th>
<th class="border p-2">Jumlah</th>

</tr>

</thead>

<tbody id="distribusiBody"></tbody>

</table>

</div>

</div>

</div>

</div>

</div>



<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyReLRvqeBF5saVOk0Wf4ztvwXz8lssR_UnTwo1RjPWidJaVJe6E7uO6d5sNLHiiPTJ/exec";


let role = "";
let totalProduksi = 0;
let totalDistribusi = 0;



function login(){

const username = document.getElementById("username").value;
const password = document.getElementById("password").value;

if(username === "admin" && password === "admin123"){

role = "admin";

masukDashboard();

}

else if(username === "warga" && password === "warga123"){

role = "warga";

masukDashboard();

}

else{

alert("Username / Password Salah");

}

}



function masukDashboard(){

document.getElementById("loginPage").classList.add("hidden");

document.getElementById("dashboard").classList.remove("hidden");

loadData();

}



function logout(){

location.reload();

}



async function simpanData(){

const namaBibit = document.getElementById("namaBibit").value;
const jumlah = parseInt(document.getElementById("jumlah").value);
const jenis = document.getElementById("jenis").value;

if(!namaBibit || !jumlah){

alert("Lengkapi Data");

return;

}

const payload = {

action: jenis,
namaBibit: namaBibit,
jumlah: jumlah,
user: role,
pengambil: role

};

try{

await fetch(API_URL,{

method:"POST",

body: JSON.stringify(payload)

});

alert("Data berhasil disimpan");

document.getElementById("namaBibit").value = "";
document.getElementById("jumlah").value = "";

loadData();

}

catch(error){

alert("Gagal menyimpan");

console.log(error);

}

}



async function loadData(){

const response = await fetch(API_URL);

const data = await response.json();

loadProduksi(data.produksi);

loadDistribusi(data.distribusi);

}



function loadProduksi(data){

let html = "";

totalProduksi = 0;

for(let i=1; i<data.length; i++){

html += `

<tr>

<td class="border p-2">
${formatTanggal(data[i][0])}
</td>

<td class="border p-2">
${data[i][1]}
</td>

<td class="border p-2 text-center">
${data[i][2]}
</td>

</tr>

`;

totalProduksi += Number(data[i][2]);

}

document.getElementById("produksiBody").innerHTML = html;

document.getElementById("totalProduksi").innerText =
totalProduksi.toLocaleString("id-ID");

updateStok();

}



function loadDistribusi(data){

let html = "";

totalDistribusi = 0;

for(let i=1; i<data.length; i++){

html += `

<tr>

<td class="border p-2">
${formatTanggal(data[i][0])}
</td>

<td class="border p-2">
${data[i][1]}
</td>

<td class="border p-2 text-center">
${data[i][2]}
</td>

</tr>

`;

totalDistribusi += Number(data[i][2]);

}

document.getElementById("distribusiBody").innerHTML = html;

document.getElementById("totalDistribusi").innerText =
totalDistribusi.toLocaleString("id-ID");

updateStok();

}



function updateStok(){

const sisa = totalProduksi - totalDistribusi;

document.getElementById("sisaStok").innerText =
sisa.toLocaleString("id-ID");

}



function formatTanggal(tanggal){

const d = new Date(tanggal);

return d.toLocaleDateString("id-ID");

}

</script>

</body>
</html>
