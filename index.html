<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sistem Bibit</title>

<script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-green-100 p-6">

<h1 class="text-2xl font-bold mb-4">Sistem Bibit</h1>

<div class="bg-white p-4 rounded shadow mb-4">
<input id="namaBibit" placeholder="Nama Bibit" class="border p-2 mr-2">
<input id="jumlah" type="number" placeholder="Jumlah" class="border p-2 mr-2">

<select id="jenis" class="border p-2 mr-2">
<option value="produksi">Produksi</option>
<option value="distribusi">Distribusi</option>
</select>

<button onclick="simpanData()" class="bg-green-600 text-white px-4 py-2 rounded">
Simpan
</button>
</div>

<h2 class="text-xl font-bold">Stok Per Bibit</h2>
<div id="stokList" class="bg-white p-4 rounded shadow mt-2"></div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbyReLRvqeBF5saVOk0Wf4ztvwXz8lssR_UnTwo1RjPWidJaVJe6E7uO6d5sNLHiiPTJ/exec";


// =========================
// HITUNG STOK PER BIBIT
// =========================
function hitungStok(produksi, distribusi){

    let stok = {};

    // PRODUKSI
    for(let i = 1; i < produksi.length; i++){
        let nama = produksi[i][1];
        let jumlah = Number(produksi[i][2]);

        if(!stok[nama]) stok[nama] = 0;

        stok[nama] += jumlah;
    }

    // DISTRIBUSI
    for(let i = 1; i < distribusi.length; i++){
        let nama = distribusi[i][1];
        let jumlah = Number(distribusi[i][2]);

        if(!stok[nama]) stok[nama] = 0;

        stok[nama] -= jumlah;
    }

    return stok;
}


// =========================
// LOAD DATA
// =========================
async function loadData(){

    const res = await fetch(API_URL);
    const data = await res.json();

    const stok = hitungStok(data.produksi, data.distribusi);

    tampilkanStok(stok);
}


// =========================
// TAMPILKAN STOK
// =========================
function tampilkanStok(stok){

    let html = "";

    for(let nama in stok){

        let warna = stok[nama] <= 0 ? "text-red-600" : "text-green-700";

        html += `
        <div class="flex justify-between border-b py-1">
            <span>${nama}</span>
            <span class="${warna}">
                ${stok[nama].toLocaleString("id-ID")}
            </span>
        </div>
        `;
    }

    document.getElementById("stokList").innerHTML = html;
}


// =========================
// SIMPAN DATA
// =========================
async function simpanData(){

    const namaBibit = document.getElementById("namaBibit").value.trim();
    const jumlah = parseInt(document.getElementById("jumlah").value);
    const jenis = document.getElementById("jenis").value;

    if(!namaBibit || isNaN(jumlah) || jumlah <= 0){
        alert("Input tidak valid");
        return;
    }

    // AMBIL DATA TERBARU
    const res = await fetch(API_URL);
    const data = await res.json();

    const stok = hitungStok(data.produksi, data.distribusi);

    // VALIDASI DISTRIBUSI
    if(jenis === "distribusi"){

        let stokSaatIni = stok[namaBibit] || 0;

        if(jumlah > stokSaatIni){
            alert("Stok tidak cukup! Sisa: " + stokSaatIni);
            return;
        }
    }

    // KIRIM DATA
    await fetch(API_URL, {
        method: "POST",
        body: JSON.stringify({
            action: jenis,
            namaBibit: namaBibit,
            jumlah: jumlah
        })
    });

    alert("Berhasil");

    document.getElementById("namaBibit").value = "";
    document.getElementById("jumlah").value = "";

    loadData();
}


// AUTO LOAD
loadData();

</script>

</body>
</html>
